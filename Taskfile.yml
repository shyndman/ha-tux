version: '3'

vars:
  PROJECT_DIR: '{{.TASKFILE_DIR}}'
  SYSTEM_SYSTEMD_DIR: /etc/systemd/system
  SERVICE_NAME: ha-tux.service
  SERVICE_SOURCE: systemd/ha-tux.service
  SERVICE_TARGET: '{{.SYSTEM_SYSTEMD_DIR}}/{{.SERVICE_NAME}}'
  OPT_DIR: /opt/ha-tux

tasks:
  install:
    desc: Install and start the hardened system service
    cmds:
      # Retire the old --user unit if present (clean cutover from the previous deployment model).
      - systemctl --user disable --now {{.SERVICE_NAME}} 2>/dev/null || true
      - rm -f "{{.HOME}}/.config/systemd/user/{{.SERVICE_NAME}}"
      - systemctl --user daemon-reload || true
      - test -d {{.OPT_DIR}} || sudo install -d -o "$(id -un)" -g "$(id -gn)" {{.OPT_DIR}}
      # System python is 3.14; the project needs 3.13. Install a uv-managed 3.13 *under /opt*
      # (not the default ~/.local store) so the venv interpreter has no /home dependency that
      # ProtectHome=tmpfs would hide.
      - UV_PYTHON_INSTALL_DIR={{.OPT_DIR}}/python uv python install 3.13
      - UV_PYTHON_INSTALL_DIR={{.OPT_DIR}}/python UV_PROJECT_ENVIRONMENT={{.OPT_DIR}}/venv uv sync --no-dev --no-editable --frozen --python-preference only-managed --python 3.13
      - sudo install -m 0644 "{{.SERVICE_SOURCE}}" "{{.SERVICE_TARGET}}"
      - sudo systemctl daemon-reload
      - sudo systemctl enable {{.SERVICE_NAME}}
      - sudo systemctl restart {{.SERVICE_NAME}}

  uninstall:
    desc: Stop and remove the system service
    cmds:
      - sudo systemctl disable --now {{.SERVICE_NAME}} || true
      - sudo rm -f "{{.SERVICE_TARGET}}"
      - sudo systemctl daemon-reload

  logs:
    desc: Display the service logs
    cmds:
      - journalctl -o cat --no-pager -u ha-tux.service {{.CLI_ARGS}}
